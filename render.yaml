services:
  - type: web
    name: lumber-ai-analytics
    runtime: python
    buildCommand: pip install -r requirements.txt && python etl/generate_data.py && python etl/loader.py
    startCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: GOOGLE_API_KEY
        sync: false  # set manually in Render dashboard, never committed
